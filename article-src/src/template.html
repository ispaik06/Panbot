(function () {
  var t = localStorage.getItem("panbot-theme");
  if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
    document.documentElement.setAttribute("data-theme", "dark");
  }
})();
</script>

<script>
// Theme toggle
document.getElementById("theme-toggle").addEventListener("click", function () {
  var root = document.documentElement;
  var dark = root.getAttribute("data-theme") === "dark";
  if (dark) { root.removeAttribute("data-theme"); localStorage.setItem("panbot-theme", "light"); }
  else { root.setAttribute("data-theme", "dark"); localStorage.setItem("panbot-theme", "dark"); }
});

// TOC scroll spy
(function () {
  var links = Array.prototype.slice.call(document.querySelectorAll(".toc a"));
  var map = {};
  links.forEach(function (a) { map[a.getAttribute("href").slice(1)] = a; });
  var headings = Array.prototype.slice.call(document.querySelectorAll("h2[id], h3[id]"));
  var active = null;
  function setActive(id) {
    if (active) active.classList.remove("active");
    active = map[id] || null;
    if (active) active.classList.add("active");
  }
  var visible = new Set();
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) visible.add(e.target.id); else visible.delete(e.target.id);
    });
    var first = headings.find(function (h) { return visible.has(h.id); });
    if (first) setActive(first.id);
  }, { rootMargin: "0px 0px -70% 0px" });
  headings.forEach(function (h) { obs.observe(h); });
})();

// YouTube lite embeds: swap thumbnail for iframe on click
(function () {
  var embeds = Array.prototype.slice.call(document.querySelectorAll(".yt-embed[data-embed]"));
  embeds.forEach(function (el) {
    el.addEventListener("click", function () {
      if (el.querySelector("iframe")) return;
      var id = el.getAttribute("data-embed");
      var f = document.createElement("iframe");
      f.src = "https://www.youtube-nocookie.com/embed/" + id + "?autoplay=1&rel=0";
      f.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      f.allowFullscreen = true;
      f.title = el.getAttribute("data-title") || "YouTube video";
      el.appendChild(f);
    });
  });
})();

// Pause hero/gallery videos when offscreen (battery friendliness)
(function () {
  var vids = Array.prototype.slice.call(document.querySelectorAll("video[autoplay]"));
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) { e.target.play().catch(function(){}); }
      else { e.target.pause(); }
    });
  }, { rootMargin: "120px" });
  vids.forEach(function (v) { obs.observe(v); });
})();
</script>
</body>
</html>
